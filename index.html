<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النموذج (12) المطور - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #212121; --secondary: #b19410; --accent: #ffc107; --bg: #f5f5f5; --white: #ffffff; --correct: #1b5e20; --wrong: #b71c1c; --feedback-bg: #fffde7; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #333; overflow-x: hidden; }
        .quiz-card { background: var(--white); width: 100%; max-width: 1000px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); border-top: 15px solid var(--secondary); padding: 35px; position: relative; }
        .header { text-align: center; border-bottom: 3px double var(--secondary); margin-bottom: 25px; padding-bottom: 20px; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #fafafa; padding: 15px; border-radius: 12px; border: 1px solid #ddd; }
        .q-badge { background: var(--primary); color: var(--accent); padding: 8px 25px; border-radius: 50px; font-weight: bold; border: 1px solid var(--secondary); }
        .timer-circle { font-weight: 900; font-size: 1.4rem; color: var(--primary); width: 65px; height: 65px; border: 4px solid var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .timer-critical { color: white; background: var(--wrong); border-color: #000; animation: shake 0.5s infinite; }
        .passage-box { background: #fffde7; padding: 25px; border-radius: 15px; border-right: 10px solid var(--secondary); margin-bottom: 25px; line-height: 2; font-size: 1.2rem; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .opt-btn { padding: 22px; border: 2px solid #eee; border-radius: 15px; cursor: pointer; transition: 0.3s; font-weight: 600; background: #fff; text-align: center; font-size: 1.1rem; }
        .opt-btn:hover { border-color: var(--secondary); background: #fffcf0; transform: translateY(-3px); }
        .correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white; border-color: var(--wrong) !important; }
        .feedback-panel { margin-top: 20px; padding: 25px; border-radius: 15px; display: none; background: var(--feedback-bg); border-right: 10px solid var(--correct); }
        .btn-main { background: var(--primary); color: var(--accent); padding: 18px 60px; border: 2px solid var(--secondary); border-radius: 12px; cursor: pointer; font-size: 1.2rem; font-weight: bold; transition: 0.3s; }
        .hidden { display: none !important; }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-container">
    <div class="header"><h3>أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد</h3></div>
    <div id="start-screen" style="text-align: center;">
        <input type="text" id="userNameInput" placeholder="اكتب اسمك الثلاثي..." style="width: 80%; padding: 20px; border-radius: 12px; border: 2px solid var(--secondary); text-align: center; font-size: 1.3rem; margin-bottom: 30px;">
        <br><button class="btn-main" onclick="startQuiz()">ابدأ اختبار النموذج 12 🚀</button>
    </div>
    <div id="quiz-screen" class="hidden">
        <div class="status-bar">
            <div>👤 الطالب: <span id="display-name" style="font-weight: bold; color: var(--secondary);"></span></div>
            <div id="display-q-idx"></div>
        </div>
        <div id="display-question" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 25px; text-align: center;"></div>
        <div id="display-options" class="options-grid"></div>
        <div id="feedback-panel" class="feedback-panel"><b id="fb-title"></b><div id="fb-desc"></div></div>
        <div style="text-align: center; margin-top: 35px;"><button id="next-btn" class="btn-main hidden" onclick="handleNext()">السؤال التالي ⮕</button></div>
    </div>
    <div id="result-screen" class="hidden">
        <h1 id="res-score" style="text-align: center;"></h1>
    </div>
</div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = {
        apiKey: "ضع_apiKey_هنا",
        authDomain: "ضع_مشروعك.firebaseapp.com",
        projectId: "ضع_project_id",
        storageBucket: "ضع_storage_bucket",
        messagingSenderId: "ضع_id",
        appId: "ضع_id"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ... (هنا ضع بقية كودك السابق rawData و startQuiz و loadQuestion و checkResult) ...
    // ملاحظة: تأكد من إدراج مصفوفة rawData كما كانت في ملفك الأصلي

    function endQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('res-score').innerText = `${scoreCount} / 40`;
        
        // --- كود إرسال النتيجة ---
        db.collection("student_results").add({
            studentName: sName,
            score: scoreCount,
            total: 40,
            date: new Date().toISOString()
        }).then(() => console.log("تم الإرسال!")).catch(err => console.error(err));
    }
</script>
</body>
</html>
