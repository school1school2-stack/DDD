<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>النموذج (12) المطور - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        /* (احتفظ بتنسيقاتك الأصلية هنا، هي ممتازة) */
        :root { --primary: #212121; --secondary: #b19410; --accent: #ffc107; --bg: #f5f5f5; --white: #ffffff; --correct: #1b5e20; --wrong: #b71c1c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .quiz-card { background: var(--white); width: 100%; max-width: 1000px; border-radius: 20px; padding: 35px; }
        .hidden { display: none !important; }
        .btn-main { background: var(--primary); color: var(--accent); padding: 18px 60px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="quiz-card" id="quiz-container">
    <div id="start-screen">
        <h3>أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد ✨</h3>
        <input type="text" id="userNameInput" placeholder="اكتب اسمك الثلاثي..." style="padding: 15px; width: 80%;">
        <br><br><button class="btn-main" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>
    
    <div id="quiz-screen" class="hidden">
        <h2 id="display-question"></h2>
        <div id="display-options"></div>
        <button id="next-btn" class="hidden" onclick="handleNext()">السؤال التالي</button>
    </div>

    <div id="result-screen" class="hidden">
        <h1>النتيجة: <span id="res-score"></span></h1>
        <p>تم حفظ نتيجتك بنجاح!</p>
    </div>
</div>

<script>
    // --- ضبط Firebase ---
    const firebaseConfig = {
        apiKey: "ضع_apiKey_هنا",
        authDomain: "ضع_projectId.firebaseapp.com",
        projectId: "ضع_projectId",
        storageBucket: "ضع_projectId.appspot.com",
        messagingSenderId: "ضع_id",
        appId: "ضع_id"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let currentQ = 0, scoreCount = 0, sName = "";
    // ضع مصفوفتك (rawData) هنا

    function startQuiz() {
        sName = document.getElementById('userNameInput').value;
        if(!sName) return alert("اكتب اسمك أولاً");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        // ... (بقية منطق تحميل الأسئلة)
    }

    function endQuiz() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('res-score').innerText = `${scoreCount} / 40`;

        // الإرسال إلى Firebase
        db.collection("student_results").add({
            studentName: sName,
            score: scoreCount,
            date: new Date().toLocaleDateString('ar-SA')
        }).then(() => {
            console.log("تم الحفظ!");
        });
    }
</script>
</body>
</html>
