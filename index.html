<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>النموذج (12) المطور - أ/ عبدالعزيز الفيفي</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        /* التنسيق الأساسي */
        body { font-family: sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        .quiz-card { background: #fff; width: 100%; max-width: 800px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        .btn { background: #000; color: #ffc107; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 1.2rem; }
        .opt-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div id="start-screen">
        <h2>أ/ عبدالعزيز الفيفي - ثانوية الأمير عبدالمجيد</h2>
        <input type="text" id="userNameInput" placeholder="اكتب اسمك الثلاثي..." style="width: 100%; padding: 15px; margin-bottom: 20px;">
        <button class="btn" onclick="startQuiz()">ابدأ الاختبار</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <h2 id="q-text"></h2>
        <div id="options-box"></div>
    </div>
</div>

<script>
    // 1. إعدادات Firebase (ضع بياناتك هنا)
    const firebaseConfig = {
        apiKey: "ضع_بياناتك_هنا",
        authDomain: "aztlg1.firebaseapp.com",
        projectId: "aztlg1",
        storageBucket: "aztlg1.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. قائمة الأسئلة (يجب أن تكون موجودة!)
    const rawData = [
        { q: "عين : حور", opts: ["فم : بخر", "جلد : نعومة"], ans: "فم : بخر", cat: "تناظر" },
        { q: "سماء : نجوم", opts: ["بحر : لؤلؤ", "غابة : أشجار"], ans: "بحر : لؤلؤ", cat: "تناظر" }
        // أضف بقية أسئلتك هنا...
    ];

    let currentQ = 0, sName = "";

    function startQuiz() {
        sName = document.getElementById('userNameInput').value;
        if(!sName) return alert("اكتب اسمك!");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if(currentQ >= rawData.length) return finish();
        let item = rawData[currentQ];
        document.getElementById('q-text').innerText = item.q;
        let box = document.getElementById('options-box');
        box.innerHTML = '';
        item.opts.forEach(o => {
            let b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerText = o;
            b.onclick = () => {
                currentQ++;
                loadQuestion();
            };
            box.appendChild(b);
        });
    }

    function finish() {
        // إرسال البيانات
        db.collection("student_results").add({
            studentName: sName,
            score: "تم",
            date: new Date().toLocaleDateString()
        });
        document.getElementById('quiz-screen').innerHTML = "<h1>شكراً لك، تم إرسال نتيجتك!</h1>";
    }
</script>
</body>
</html>
